name: Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  build-module:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
 
      - name: Setup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y erofs-utils erofsfuse wget unzip xz-utils
          wget 'https://github.com/ssut/payload-dumper-go/releases/download/1.3.0/payload-dumper-go_1.3.0_linux_amd64.tar.gz'
          tar -xvf payload-dumper-go_1.3.0_linux_amd64.tar.gz
          chmod +x payload-dumper-go

      - name: Download HyperOS
        run: |
          wget 'https://bkt-sgp-miui-ota-update-alisgp.oss-ap-southeast-1.aliyuncs.com/OS3.0.5.0.VMNCNXM/mondrian-ota_full-OS3.0.5.0.VMNCNXM-user-15.0-d9db2e6dd9.zip'
          unzip mondrian-ota_full-OS3.0.5.0.VMNCNXM-user-15.0-d9db2e6dd9.zip payload.bin

      - name: Unpack HyperOS
        run: |
          ./payload-dumper-go -o ./ -p product ./payload.bin
          mkdir -p product
          fsck.erofs product.img --extract=product

      - name: Assemble module
        run: |
          # add App
          cp -a ./product/app/MIUISuperMarket ./module/system/app/MIUISuperMarket
          # remove oat
          find ./module -name "oat" -type d -exec rm -rf {} +

      - name: Package module
        run: |
          cd module/
          zip -r ../GetApps4XiaomiEU.zip *

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: GetApps4XiaomiEU.zip
